<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — Mycological Solutions Ltd</title>

  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#0f172a; color:#f1f5f9; }
    header { padding:20px; text-align:center; background:#111827; }
    .logo { width:220px; height:auto; display:block; margin:0 auto 15px auto; }
    nav a { margin:0 10px; color:#94a3b8; text-decoration:none; font-weight:500; }
    nav a:hover { color:white; }
    .container { max-width:900px; margin:40px auto; padding:20px; }
    .card { background:#1e293b; padding:20px; border-radius:10px; }
    footer { text-align:center; padding:20px; background:#111827; color:#94a3b8; margin-top:40px; }

    input, textarea { width:100%; padding:10px; margin-top:8px; margin-bottom:16px; border-radius:6px; border:none; }
    button { padding:10px 15px; background:#22c55e; border:none; border-radius:6px; font-weight:bold; cursor:pointer; }
  </style>
</head>
<body>

<header>
  <img src="logo.png" alt="Mycological Solutions Ltd" class="logo">
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="products.html">Products</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="container">
  <div class="card">
    <h2>Contact Us</h2>
    <p>You can reach us via email or by using the form below.</p>

    <p><strong>Email:</strong> your@email.com</p>

    <form>
      <label>Name</label>
      <input type="text" placeholder="Your name">

      <label>Email</label>
      <input type="email" placeholder="Your email">

      <label>Message</label>
      <textarea rows="5" placeholder="Your message"></textarea>

      <button type="submit">Send Message</button>
    </form>

    <p style="font-size:14px; opacity:0.7;">
      (Note: This form does not send messages yet. We’ll connect it properly later.)
    </p>
  </div>
</div>

<footer>
  © 2026 Mycological Solutions Ltd
</footer>

</body>
</html>

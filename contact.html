<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact — Mycological Solutions Ltd</title>

<style>
:root{
--bg:#0f172a;
--header:#111827;
--card:#1e293b;
--text:#f1f5f9;
--muted:#94a3b8;
--accent:#22c55e;
--max:1100px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,sans-serif;
background:var(--bg);
color:var(--text);
line-height:1.6;
}

header{
background:var(--header);
padding:18px 22px;
}

.header-inner{
max-width:var(--max);
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
width:150px;
}

nav a{
margin-left:20px;
color:var(--muted);
text-decoration:none;
font-weight:600;
}

nav a:hover{
color:white;
}

.container{
max-width:var(--max);
margin:40px auto;
padding:0 22px;
}

.card{
background:var(--card);
padding:28px;
border-radius:12px;
}

form{
margin-top:20px;
display:flex;
flex-direction:column;
gap:14px;
}

input, textarea{
padding:12px;
border-radius:6px;
border:none;
font-size:14px;
}

textarea{
min-height:140px;
resize:vertical;
}

button{
background:var(--accent);
color:#052e16;
padding:12px;
border:none;
border-radius:6px;
font-weight:700;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

footer{
margin-top:40px;
padding:20px;
background:var(--header);
color:var(--muted);
text-align:center;
}

</style>
</head>

<body>

<header>
<div class="header-inner">

<img src="logo.png" alt="Mycological Solutions Ltd logo" class="logo">

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="services.html">Services</a>
<a href="products.html">Products</a>
<a href="contact.html">Contact</a>
</nav>

</div>
</header>

<main class="container">

<section class="card">

<h1>Contact Us</h1>

<p>
If you would like to discuss a project, collaboration, or product partnership, please send us a message using the form below.
</p>

<form action="https://formsubmit.co/mycological.solutions.kft@gmail.com" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" placeholder="Your Message" required></textarea>

<input type="hidden" name="_subject" value="New message from Mycological Solutions website">

<input type="hidden" name="_captcha" value="false">

<button type="submit">Send Message</button>

</form>

</section>

</main>

<footer>
© 2026 Mycological Solutions Ltd
</footer>

</body>
</html>
